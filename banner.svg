<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Shreyana Adhikari GitHub Profile Banner</title>
<desc>Flat art tennis court banner with animated name and bouncing ball</desc>

<defs>
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes bounce {
      0%   { transform: translateY(0px); }
      30%  { transform: translateY(-32px); }
      50%  { transform: translateY(0px); }
      65%  { transform: translateY(-14px); }
      80%  { transform: translateY(0px); }
      90%  { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }
    @keyframes shadow-pulse {
      0%   { transform: scaleX(1);    opacity: 0.5; }
      30%  { transform: scaleX(0.35); opacity: 0.15; }
      50%  { transform: scaleX(1);    opacity: 0.5; }
      65%  { transform: scaleX(0.6);  opacity: 0.3; }
      80%  { transform: scaleX(1);    opacity: 0.5; }
      90%  { transform: scaleX(0.8);  opacity: 0.38; }
      100% { transform: scaleX(1);    opacity: 0.5; }
    }
    @keyframes reveal-name {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0% 0 0); }
    }
    @keyframes reveal-sub {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0% 0 0); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .ball-group { animation: bounce 2.4s cubic-bezier(0.36,0,0.64,1) infinite; transform-origin: 200px 178px; }
    .shadow     { animation: shadow-pulse 2.4s cubic-bezier(0.36,0,0.64,1) infinite; transform-origin: 200px 196px; }
    .name-wrap  { animation: reveal-name 2.4s steps(18,end) 0.3s forwards; clip-path: inset(0 100% 0 0); }
    .sub-wrap   { animation: reveal-sub 1.8s steps(40,end) 2.9s forwards; clip-path: inset(0 100% 0 0); }
    .tagline    { animation: fade-in 1s ease 4.8s forwards; opacity: 0; }
    .cursor     { animation: blink 0.75s step-end 0.3s 4; }
  </style>
</defs>

<!-- Navy dark corners background -->
<rect width="680" height="280" fill="#0d1b4b"/>

<!-- Green side panel top-right -->
<polygon points="400,0 680,0 680,180 460,280 380,280 380,60" fill="#7ec85a"/>

<!-- Blue court main area -->
<polygon points="0,0 400,0 380,60 380,280 0,280" fill="#4a90d9"/>

<!-- Court lines on blue -->
<line x1="0"   y1="155" x2="380" y2="155" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
<line x1="190" y1="0"   x2="190" y2="280" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
<line x1="0"   y1="0"   x2="380" y2="0"   stroke="#ffffff" stroke-width="2"/>
<line x1="0"   y1="280" x2="380" y2="280" stroke="#ffffff" stroke-width="2"/>
<line x1="0"   y1="0"   x2="0"   y2="280" stroke="#ffffff" stroke-width="2"/>

<!-- Court line on green side -->
<line x1="460" y1="280" x2="680" y2="180" stroke="#ffffff" stroke-width="2" opacity="0.5"/>

<!-- Net shadow (cast on court) -->
<polygon points="0,200 380,200 380,230 0,240" fill="#0d1b4b" opacity="0.35"/>

<!-- Net -->
<line x1="0"   y1="200" x2="680" y2="170" stroke="#ffffff" stroke-width="3"/>
<!-- Net posts -->
<line x1="0"   y1="200" x2="0"   y2="215" stroke="#1a1a3e" stroke-width="4"/>
<line x1="680" y1="170" x2="680" y2="185" stroke="#1a1a3e" stroke-width="4"/>
<!-- Net grid lines -->
<line x1="0"   y1="207" x2="680" y2="177" stroke="#2255aa" stroke-width="1" opacity="0.6"/>
<line x1="0"   y1="214" x2="680" y2="184" stroke="#2255aa" stroke-width="1" opacity="0.6"/>
<line x1="68"  y1="200" x2="62"  y2="216" stroke="#2255aa" stroke-width="1" opacity="0.6"/>
<line x1="136" y1="200" x2="130" y2="216" stroke="#2255aa" stroke-width="1" opacity="0.6"/>
<line x1="204" y1="200" x2="198" y2="216" stroke="#2255aa" stroke-width="1" opacity="0.6"/>
<line x1="272" y1="200" x2="266" y2="216" stroke="#2255aa" stroke-width="1" opacity="0.6"/>
<line x1="340" y1="200" x2="334" y2="216" stroke="#2255aa" stroke-width="1" opacity="0.6"/>

<!-- Racket (flat art style) -->
<g transform="translate(60,30) rotate(-35)">
  <!-- Handle -->
  <rect x="0" y="88" width="10" height="50" rx="3" fill="#c0621a"/>
  <rect x="1" y="105" width="8" height="8" fill="#1a1a4e"/>
  <!-- Throat -->
  <path d="M2,88 L5,68 L8,68 L10,88 Z" fill="#1a1a4e"/>
  <!-- Frame -->
  <ellipse cx="5" cy="45" rx="26" ry="32" fill="none" stroke="#e8e8f0" stroke-width="5"/>
  <ellipse cx="5" cy="45" rx="21" ry="27" fill="none" stroke="#1a1a4e" stroke-width="1.5"/>
  <!-- Strings horizontal -->
  <line x1="-20" y1="30" x2="30" y2="30" stroke="#d0d0e8" stroke-width="0.8" opacity="0.8"/>
  <line x1="-23" y1="38" x2="33" y2="38" stroke="#d0d0e8" stroke-width="0.8" opacity="0.8"/>
  <line x1="-25" y1="46" x2="35" y2="46" stroke="#d0d0e8" stroke-width="0.8" opacity="0.8"/>
  <line x1="-23" y1="54" x2="33" y2="54" stroke="#d0d0e8" stroke-width="0.8" opacity="0.8"/>
  <line x1="-18" y1="62" x2="28" y2="62" stroke="#d0d0e8" stroke-width="0.8" opacity="0.8"/>
  <!-- Strings vertical -->
  <line x1="-10" y1="18" x2="-10" y2="72" stroke="#d0d0e8" stroke-width="0.8" opacity="0.8"/>
  <line x1="-2"  y1="14" x2="-2"  y2="76" stroke="#d0d0e8" stroke-width="0.8" opacity="0.8"/>
  <line x1="6"   y1="14" x2="6"   y2="76" stroke="#d0d0e8" stroke-width="0.8" opacity="0.8"/>
  <line x1="14"  y1="16" x2="14"  y2="74" stroke="#d0d0e8" stroke-width="0.8" opacity="0.8"/>
  <line x1="22"  y1="20" x2="22"  y2="70" stroke="#d0d0e8" stroke-width="0.8" opacity="0.8"/>
</g>

<!-- Ball shadow -->
<ellipse class="shadow" cx="200" cy="196" rx="12" ry="4" fill="#0d1b4b" opacity="0.5"/>

<!-- Ball with bounce animation -->
<g class="ball-group">
  <circle cx="200" cy="178" r="11" fill="#d4f020"/>
  <path d="M191,173 Q200,177 209,173" stroke="#5a8000" stroke-width="1.4" fill="none"/>
  <path d="M191,183 Q200,179 209,183" stroke="#5a8000" stroke-width="1.4" fill="none"/>
</g>

<!-- Dark overlay on right side for text readability -->
<rect x="340" y="0" width="340" height="280" fill="#0d1b4b" opacity="0.72"/>

<!-- Text: Name with typewriter reveal -->
<g class="name-wrap">
  <text x="370" y="110"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36px"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="2px">Shreyana Adhikari</text>
</g>

<!-- Blinking cursor -->
<rect class="cursor" x="638" y="76" width="3" height="38" fill="#60a5fa"/>

<!-- Subtitle -->
<g class="sub-wrap">
  <text x="370" y="140"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13px"
    fill="#93c5fd"
    letter-spacing="1.5px">BSc CSIT · Data Science</text>
  <text x="370" y="160"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13px"
    fill="#93c5fd"
    letter-spacing="1.5px">St. Xavier's College, Kathmandu</text>
</g>

<!-- Tagline -->
<g class="tagline">
  <text x="370" y="200"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="12px"
    fill="#4ade80"
    letter-spacing="1.8px">🎾  tennis. data. code.</text>
</g>

<!-- Thin accent line under name -->
<rect x="370" y="118" width="120" height="2" rx="1" fill="#2563eb" opacity="0.8"/>

</svg>
